<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>пинкер</title>
    <style>
        :root {
            --bg-start: #4A233E;
            --bg-end: #170B13;
            --accent-color: #B93585;
            --footer-text-color: #6C2E54;
            --main-text-color: #ffffff;
            --font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            --content-width: 900px;
            --vertical-spacing: 80px; 
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body, html {
            width: 100%;
            font-family: var(--font-family);
            color: var(--main-text-color);
            background-color: var(--bg-end);
        }

        .page-wrapper {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background: radial-gradient(circle at top, var(--bg-start) 0%, var(--bg-end) 60%);
            outline: 10px solid rgba(185, 53, 132, 0.171);
            outline-offset: -10px;
            position: relative;
        }

        .container {
            display: flex;
            justify-content: center;
            padding: var(--vertical-spacing) 20px;
            width: 100%;
        }

        .content-grid {
            display: flex;
            align-items: stretch;
            justify-content: center;
            gap: 50px;
            width: fit-content;
        }

        .image-block {
            flex-shrink: 0;
            width: 400px;
            height: 400px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            overflow: hidden;
        }

        .image-block img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .info-block {
            flex-grow: 0;
            display: flex;
            flex-direction: column;
            justify-content: space-between; 
            text-align: right;
            padding-bottom: 10px; 
        }

        .info-top h1 {
            font-size: 89px;
            line-height: 0.85;
            text-transform: uppercase;
            font-weight: 900;
            margin-bottom: 10px;
        }

        .nav-links {
            font-size: 18px;
            color: var(--main-text-color);
            opacity: 0.8;
            text-decoration: none;
        }

        .nav-links a {
            color: inherit;
            text-decoration: none;
            transition: opacity 0.3s;
        }

        .nav-links a:hover {
            opacity: 0.5;
        }

        .about-text {
            font-size: 15px;
            line-height: 1.4;
            max-width: 420px;
            margin-left: auto;
            margin-bottom: 20px;
            white-space: pre-line;
            opacity: 0.7;
        }

        .social-icons {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
            align-items: center;
        }

        .icon-link {
            width: 32px;
            height: 32px;
            display: block;
            transition: opacity 0.2s;
        }

        .icon-link:hover { opacity: 0.7; }
        .icon-link svg { width: 100%; height: 100%; fill: white; }

        footer {
            margin-top: 0; 
            padding-bottom: 40px;
            text-align: center;
            color: var(--footer-text-color);
            font-size: 13px;
        }

        .footer-divider {
            width: 100%;
            margin: 0 auto 25px auto;
            border: 0;
            border-top: 2px dashed var(--footer-text-color);
            opacity: 0.4;
            max-width: 780px
        }

        footer p { margin-bottom: 5px; }

        footer a { color: var(--footer-text-color); }

        @media (max-width: 900px) {
            .container {
                padding-top: 40px;
            }

            .content-grid {
                flex-direction: column;
                align-items: center;
                gap: 20px;
                text-align: center;
            }

            .info-block {
                text-align: center;
                padding-bottom: 0;
            }

            .info-top h1 {
                font-size: 60px;
            }

            .image-block {
                width: 90%;
                max-width: 320px;
                height: auto;
                aspect-ratio: 443 / 503;
            }

            .about-text {
                display: none; 
            }

            .social-icons {
                justify-content: center;
                margin-top: 20px;
            }
            
            .footer-divider {
                max-width: 80%;
            }

            footer {
                margin-top: auto; 
                padding-top: 0px;
            }
        }
                .icon-link img {
            width: 100%;
            height: 100%;
            object-fit: contain; 
            filter: brightness(0) invert(1); 
            display: block;
        }
    </style>
</head>
<body>

    <div class="page-wrapper">
        <div class="container">
            <div class="content-grid">
                
                <div class="image-block">
                    <img src="/files/image-removebg-preview (1) 1.png" alt="Character">
                </div>

                <div class="info-block">
                    <div class="info-top">
                        <h1>pinker</h1>
                        <nav class="nav-links">
                            <a href="/упс">про меня</a> // <a href="/упс">творчество</a> // <a href="/упс">блог</a>
                        </nav>
                    </div>

                    <div class="info-bottom">
                        <div class="about-text">
                            Привяу, я Артём, 16 yo, Германия. Велком!
                            Говорю свободно на русском, более менее
                            на немецком и кое-как по английски
                            Занимаюсь всем к чему душа лежит, типо
                            дизайн, монтаж, музыка, утау и тп
                        </div>
                        
                        <div class="social-icons">
                            <a href="https://www.instagram.com/aapinker" class="icon-link"><img src="/files/instagram.svg" alt="Инстаграм"></a>
                            <a href="https://t.me/a_a_pinker" class="icon-link"><img src="/files/telegram.svg" alt="Телеграм"></a>
                            <a href="https://www.youtube.com/@aapinker" class="icon-link"><img src="/files/youtube.svg" alt="Ютуб"></a>
                            <a href="https://www.tiktok.com/@a.a.pinker" class="icon-link"><img src="/files/tiktok.svg" alt="Тикток"></a>
                        </div>
                    </div>
                </div>

            </div>
        </div>

        <footer>
            <hr class="footer-divider">
            <p>без понятия чей артик - взял его в пинтересте</p>
            <p>2024-сейчас, <a href="/privacy">privacy</a></p>
        </footer>
    </div>

</body>
</html>
