<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KTJM // @Kototjom</title>
    <style>
        @font-face {
           font-family: 'Montserrat';
           src: url('/files/Montserrat-VariableFont_wght.ttf') format('truetype-variations');
           font-weight: 100 900;
           font-style: normal;
           font-display: swap;
       }

        :root {
            --primary: #3f4581;
            --primary-soft: #4e559e;
            --bg: #16171d;
            --paper: rgba(63, 69, 129, 0.12);
            --text: #e2e4f3;
            --text-dim: #8e92b2;
            --rounding: 28px;
            --overlay: rgba(0, 0, 0, 0.6);
        }

        ::-webkit-scrollbar {
            width: 10px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 10px;
            border: 2px solid var(--bg);
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--primary-soft);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Montserrat', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 100px 0 0;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(63, 69, 129, 0.1), transparent),
                url("/files/stardust.png"); /* текстура с сайта https://www.transparenttextures.com/ */
        }

        .container {
            width: calc(100% - 40px);
            max-width: 440px;
            text-align: center;
            flex-grow: 1;
            margin-bottom: 80px;
        }

        .profile {
            margin-bottom: 40px;
        }

        .badge {
            font-size: 0.7rem;
            background: var(--primary);
            padding: 4px 12px;
            border-radius: 50px;
            display: inline-block;
            margin-bottom: 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .name-block h1 {
            font-size: 3.5rem;
            font-weight: 900;
            letter-spacing: -2px;
            line-height: 1;
            color: var(--text);
        }

        .name-block .sub-name {
            font-size: 1rem;
            color: var(--primary-soft);
            font-weight: 600;
            margin-top: 5px;
        }

        .links-wrap {
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin-bottom: 50px;
        }

        .link-item {
            background: var(--paper);
            border: 2px solid transparent;
            border-radius: var(--rounding);
            padding: 18px;
            text-decoration: none;
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.4s ease;
        }

        .link-item:hover {
            background: rgba(63, 69, 129, 0.25);
            transform: translateY(-2px);
            border-color: var(--primary-soft);
        }

        .link-item span:first-child {
            font-weight: 600;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .label-eng {
            font-size: 0.7rem;
            opacity: 0.4;
            text-transform: uppercase;
        }

        .creative-title {
            text-align: left;
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 20px;
            padding-left: 10px;
            color: var(--text-dim);
            display: flex;
            justify-content: space-between;
        }

        /* Обновленная сетка для 2-х элементов */
        .bento-box {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .card {
            background: var(--paper);
            border-radius: var(--rounding);
            padding: 20px;
            text-align: left;
            position: relative;
            transition: 0.3s;
            border: 1px solid rgba(255,255,255,0.05);
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
        }

        .card:hover {
            background: var(--primary);
            transform: scale(1.02);
        }

        .card h3 {
            font-size: 0.9rem;
            margin-bottom: 8px;
            color: var(--text);
        }

        .card p {
            font-size: 0.75rem;
            color: var(--text-dim);
            line-height: 1.4;
        }

        .card-icon {
            font-size: 1.5rem;
            margin-bottom: 10px;
            display: block;
        }

        footer {
            width: 100%;
            background: rgba(0, 0, 0, 0.25);
            padding: 60px 20px;
            text-align: center;
            border-top: 1px solid rgba(255,255,255,0.03);
            margin-top: auto;
        }

        .footer-text {
            font-size: 0.7rem;
            opacity: 0.4;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .container > * { animation: fadeIn 1s ease forwards; }
    </style>
</head>
<body>

    <div class="container">
        <header class="profile">
            <div class="badge">ready to slay</div>
            <div class="name-block">
                <h1>KTJM</h1>
                <div class="sub-name">aka @kototjom</div>
            </div>
        </header>

        <nav class="links-wrap">
            <a href="https://t.me/kototjom_telegram" class="link-item">
                <span><small>🍵</small> Telegram</span>
                <span class="label-eng">Blog</span>
            </a>
            <a href="https://www.instagram.com/kototjom/" class="link-item">
                <span><small>🍙</small> Instagram</span>
                <span class="label-eng">Life</span>
            </a>
            <a href="https://www.youtube.com/@kototjom" class="link-item">
                <span><small>📻</small> YouTube</span>
                <span class="label-eng">Videos</span>
            </a>
            <a href="https://www.tiktok.com/@kototjom" class="link-item">
                <span><small>📻</small> TikTok</span>
                <span class="label-eng">Reposts</span>
            </a>
        </nav>

        <div class="creative-title">
            <span>Творческий уголок</span>
            <span style="opacity: 0.5; text-transform: uppercase; letter-spacing: 1px;">Creative</span>
        </div>

        <div class="bento-box">
            <!-- Кнопка 1: Поэзия (Ссылка) -->
            <a href="https://t.me/your_poetry_link" class="card">
                <span class="card-icon">🎋</span>
                <h3>Поэзия</h3>
                <p>Цифровой хаос и вдохновение.</p>
            </a>
            
            <!-- Кнопка 2: Другое (Ссылка) -->
            <a href="https://t.me/your_other_projects" class="card">
                <span class="card-icon">🎐</span>
                <h3>Другое</h3>
                <p>Проекты и идеи.</p>
            </a>
        </div>
    </div>

    <footer>
        <div class="footer-text">
            © 2024-2026 — муа💙 <a href="/privacy/" style="text-decoration: none; color: #ffffff;">privacy</a>
        </div>
    </footer>

</body>
</html>
